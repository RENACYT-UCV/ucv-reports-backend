services:

  # ── NestJS API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./ucv-reports-backend
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  # ── Express frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ucv-reports-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
